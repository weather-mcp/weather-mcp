<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 1280px; height: 640px; overflow: hidden; }
  body {
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: #0b1220;
    background-image:
      radial-gradient(ellipse 900px 500px at 85% -10%, rgba(56, 132, 255, 0.22), transparent 60%),
      radial-gradient(ellipse 700px 400px at -5% 110%, rgba(45, 200, 190, 0.14), transparent 60%);
    color: #e8edf6;
    position: relative;
  }
  /* subtle grid */
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(120, 150, 200, 0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(120, 150, 200, 0.05) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .wrap {
    position: relative;
    height: 100%;
    padding: 64px 80px 64px 80px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
  }
  .kicker {
    display: flex; align-items: center; gap: 14px;
    font-size: 22px; letter-spacing: 0.16em; text-transform: uppercase;
    color: #7fa6d9; font-weight: 600;
  }
  .kicker .dot { width: 10px; height: 10px; border-radius: 50%; background: #3ecf8e; box-shadow: 0 0 12px rgba(62,207,142,.8); }
  h1 {
    font-size: 88px; font-weight: 800; letter-spacing: -0.02em;
    line-height: 1.02; margin-top: 22px;
    color: #ffffff;
  }
  h1 .accent {
    background: linear-gradient(92deg, #5aa7ff 0%, #46d8c8 100%);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .tagline {
    margin-top: 24px;
    font-size: 34px; font-weight: 500; line-height: 1.3;
    color: #b7c4d8;
  }
  .tagline b { color: #ffffff; font-weight: 700; }
  .bottom {
    display: flex; align-items: flex-end; justify-content: space-between;
  }
  .chips { display: flex; gap: 11px; flex-wrap: nowrap; }
  .chip {
    font-size: 20px; font-weight: 600;
    padding: 10px 18px; border-radius: 999px;
    border: 1.5px solid rgba(127, 166, 217, 0.35);
    background: rgba(30, 48, 80, 0.45);
    color: #cfe0f5;
    white-space: nowrap;
  }
  .install {
    display: inline-block;
    margin-top: 42px;
    font-family: "SF Mono", "Cascadia Code", Consolas, monospace;
    font-size: 25px;
    color: #9fd8b4;
    background: rgba(8, 14, 26, 0.85);
    border: 1.5px solid rgba(127, 166, 217, 0.28);
    border-radius: 14px;
    padding: 18px 26px;
    white-space: nowrap;
  }
  .install .p { color: #6b7f9c; }
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="wrap">
    <div>
      <div class="kicker"><span class="dot"></span> Model Context Protocol Server</div>
      <h1>Weather <span class="accent">MCP</span></h1>
      <div class="tagline"><b>16 weather tools for AI agents.</b><br>Free public APIs · No keys · No signup · Open source</div>
      <div class="install"><span class="p">$</span> npx @dangahagan/weather-mcp</div>
    </div>
    <div class="bottom">
      <div class="chips" style="align-content:flex-end;">
        <span class="chip">Forecasts</span>
        <span class="chip">Alerts</span>
        <span class="chip">Air Quality</span>
        <span class="chip">Marine</span>
        <span class="chip">Radar</span>
        <span class="chip">Lightning</span>
        <span class="chip">Wildfires</span>
        <span class="chip">History → 1940</span>
      </div>
    </div>
  </div>
</body>
</html>
